services:
  api:
    build:
      context: .
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      MONGO_URI: "${MONGO_URI:?MONGO_URI must point to an external MongoDB instance}"
      MONGO_DATABASE: "${MONGO_DATABASE:-fark_noi}"
      WORKSPACE_ID: "${WORKSPACE_ID:-wsp_demo}"
      JWT_SECRET: "${JWT_SECRET:-local-development-secret-change-me}"
      DEV_COLLABORATOR_ID: "${DEV_COLLABORATOR_ID:-col_demo}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
      MCP_ENABLED: "${MCP_ENABLED:-false}"
      MCP_PATH: "${MCP_PATH:-/mcp}"
    ports:
      - "${API_PORT:-8081}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
