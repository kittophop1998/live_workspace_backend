services:
  api:
    build:
      context: .
    environment:
      HTTP_ADDR: ":8080"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DATABASE: fark_noi
      WORKSPACE_ID: wsp_demo
      DEV_COLLABORATOR_ID: col_demo
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mongo_data:
